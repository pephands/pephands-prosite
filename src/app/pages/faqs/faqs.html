<div class="faq-page-header text-center">
  <div class="container position-relative z-1">
    <h1 class="display-4 fw-bold text-white mb-3">Frequently Asked Questions</h1>
    <p class="text-white-50 lead mb-0">Find answers to the most common questions about our foundation.</p>
  </div>
</div>

<div class="container py-5 my-5">
  <div class="row g-5">
    
    <!-- Sidebar: Categories -->
    <div class="col-lg-4">
      <div class="sticky-top" style="top: 100px;">
        <h4 class="fw-bold mb-4 text-pep-ink">Categories</h4>
        <div class="list-group border-0 shadow-sm rounded-4 overflow-hidden">
          <button 
            *ngFor="let cat of faqCategories" 
            (click)="setActiveCategory(cat.id)"
            [class.active-category]="activeCategory === cat.id"
            class="list-group-item list-group-item-action d-flex align-items-center py-3 border-0 border-bottom faq-category-btn">
            <i class="bi {{ cat.icon }} fs-5 me-3 text-pep-primary"></i>
            <span class="fw-bold">{{ cat.title }}</span>
            <i class="bi bi-chevron-right ms-auto small text-muted transition-arrow"></i>
          </button>
        </div>

        <div class="mt-5 p-4 bg-pep-bg rounded-4 border text-center">
          <h5 class="fw-bold text-pep-ink">Still have questions?</h5>
          <p class="text-muted small mb-3">If you cannot find the answer you are looking for, please reach out to us directly.</p>
          <a href="mailto:info@pephands.org" class="btn btn-primary rounded-pill px-4 py-2 fw-bold w-100 shadow-sm">
            Contact Support
          </a>
        </div>
      </div>
    </div>

    <!-- Main Content: Accordion -->
    <div class="col-lg-8">
      <ng-container *ngFor="let cat of faqCategories">
        <div *ngIf="activeCategory === cat.id" class="fade-in-section">
          
          <div class="d-flex align-items-center mb-4">
            <div class="icon-circle bg-pep-primary text-white d-flex justify-content-center align-items-center rounded-circle me-3 shadow-sm" style="width: 48px; height: 48px;">
              <i class="bi {{ cat.icon }} fs-4"></i>
            </div>
            <h2 class="fw-bold text-pep-ink mb-0">{{ cat.title }}</h2>
          </div>

          <div class="accordion custom-accordion shadow-sm rounded-4 overflow-hidden" id="faqAccordion-{{ cat.id }}">
            <div class="accordion-item border-0 border-bottom" *ngFor="let item of cat.questions; let i = index">
              <h2 class="accordion-header" id="heading-{{ cat.id }}-{{ i }}">
                <button 
                  class="accordion-button fw-bold text-pep-ink py-3" 
                  [class.collapsed]="openQuestionId !== cat.id + '-' + i"
                  type="button" 
                  (click)="toggleQuestion(cat.id + '-' + i)">
                  {{ item.q }}
                </button>
              </h2>
              <div 
                [id]="'collapse-' + cat.id + '-' + i" 
                class="accordion-collapse collapse" 
                [class.show]="openQuestionId === cat.id + '-' + i">
                <div class="accordion-body text-muted bg-light lh-lg px-4 py-3">
                  {{ item.a }}
                </div>
              </div>
            </div>
          </div>

        </div>
      </ng-container>
    </div>

  </div>
</div>
