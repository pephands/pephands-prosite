<div class="container my-5 py-5">
  <div class="d-flex justify-content-center mb-5 pb-3">
    <ul class="nav-pills toggle-pill-container m-0 p-1 flex-nowrap border-0 list-unstyled d-flex">
      <li class="flex-fill text-center">
        <button
          class="toggle-pill-link text-decoration-none text-nowrap w-100"
          [class.active]="activeTab === 1"
          (click)="activeTab = 1"
        >
          Recent Events
        </button>
      </li>
      <li class="flex-fill text-center">
        <button
          class="toggle-pill-link text-decoration-none text-nowrap w-100"
          [class.active]="activeTab === 2"
          (click)="activeTab = 2"
        >
          Upcoming Events
        </button>
      </li>
    </ul>
  </div>

  <div class="mt-2">
    <!-- Recent Events Tab -->
    <div *ngIf="activeTab === 1">
      <div
        class="d-flex justify-content-center align-items-center mb-5"
        *ngIf="recentEvents && recentEvents.length > 0; else noRecent"
      >
        <div class="container">
          <header
            class="d-flex flex-column text-center justify-content-center align-items-center heading-box mb-5"
          >
            <span class="topic-label">Our Impact</span>
            <h1 class="purple heading display-4 fw-bold mb-3">Our Recent Events</h1>
            <div class="accent-line mx-md-auto ms-0 mb-4"></div>
            <p class="mild-purple sub-heading">What we did recently</p>
          </header>
          <div class="row g-4 justify-content-center align-items-stretch">
            <div
              *ngFor="let recent of recentEvents; let i = index"
              class="col-lg-4 col-md-6 col-sm-12 d-flex justify-content-center"
            >
              <app-recent-card [recentEvent]="recent" [index]="i" class="w-100"></app-recent-card>
            </div>
          </div>
        </div>
      </div>
      <ng-template #noRecent>
        <div class="text-center py-5 my-5">
          <h3 class="purple">No recent events found.</h3>
        </div>
      </ng-template>
    </div>

    <!-- Upcoming Events Tab -->
    <div *ngIf="activeTab === 2">
      <div
        class="d-flex justify-content-center align-items-center mb-5"
        *ngIf="upcomingEvents && upcomingEvents.length > 0; else noUpcoming"
      >
        <div class="container">
          <header
            class="d-flex flex-column text-center justify-content-center align-items-center heading-box mb-5"
          >
            <span class="topic-label">Join Our Journey</span>
            <h1 class="purple heading display-4 fw-bold mb-3">Our Upcoming Events</h1>
            <div class="accent-line mx-md-auto ms-0 mb-4"></div>
            <p class="mild-purple sub-heading">Come join us</p>
          </header>
          <div class="row g-4 justify-content-center align-items-stretch">
            <div
              *ngFor="let upcoming of upcomingEvents; let i = index"
              class="col-lg-4 col-md-6 col-sm-12 d-flex justify-content-center"
            >
              <app-recent-card [recentEvent]="upcoming" [index]="i" class="w-100"></app-recent-card>
            </div>
          </div>
        </div>
      </div>
      <ng-template #noUpcoming>
        <div class="text-center py-5 my-5">
          <mat-icon style="font-size: 64px; height: 64px; width: 64px; color: #ccc" class="mb-3"
            >event_busy</mat-icon
          >
          <h3 class="purple mb-3">Stay Tuned!</h3>
          <p class="mild-purple">
            We are planning something amazing. There are no upcoming events at the moment.
          </p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
