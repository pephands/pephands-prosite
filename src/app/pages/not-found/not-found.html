<section class="not-found-section d-flex align-items-center justify-content-center position-relative overflow-hidden">
  
  <!-- Decorative Background Elements -->
  <div class="blob shape-1 position-absolute rounded-circle"></div>
  <div class="blob shape-2 position-absolute rounded-circle"></div>

  <div class="container text-center position-relative z-1">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        
        <!-- 404 3D Illustration -->
        <div class="mb-4 text-center">
          <img src="/404-illustration.png" alt="404 Page Not Found Illustration" class="img-fluid drop-shadow-lg" style="max-width: 350px; border-radius: 30px;">
        </div>
        
        <!-- Heading -->
        <h2 class="display-4 fw-bold text-pep-ink mb-4 tracking-tight">Oops! Page Not Found</h2>

          <a routerLink="/" class="btn btn-pep-primary text-white btn-lg rounded-pill px-5 py-3 fw-bold shadow-lg hover-lift transition-all">

          </a>
          <a routerLink="/contact-us" class="btn btn-outline-dark btn-lg rounded-pill px-5 py-3 fw-bold hover-lift transition-all">

      </div>
    </div>
