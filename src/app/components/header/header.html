<div class="trendy-header-wrapper">
  <header class="navbar navbar-expand-lg trendy-header">
    <div class="w-100 d-flex justify-content-between align-items-center p-2">

      <!-- Left: Logo -->
      <a class="navbar-brand m-0 p-0 ps-3" href="/">
        <img src="/logos/pephands-foundation.png" alt="Pephands Foundation" height="36"
          class="d-inline-block align-text-top">
      </a>

      <!-- Right: Navigation & Donate Button -->
      <div class="d-flex align-items-center gap-1 pe-2">
        
        <!-- About Us Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="aboutMenu" #aboutTrigger="matMenuTrigger"
          (mouseenter)="openMenu(aboutTrigger)" (mouseleave)="closeMenu(aboutTrigger)"
          class="text-pep-ink fw-semibold">
          About Us <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #aboutMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(aboutTrigger)" (mouseleave)="closeMenu(aboutTrigger)">
            <button mat-menu-item>Our motto</button>
            <button mat-menu-item>How we started</button>
            <button mat-menu-item>Our founders and trustees</button>
            <button mat-menu-item>Board members</button>
            <button mat-menu-item>Advisory members</button>
          </div>
        </mat-menu>

        <!-- Our Programs Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="programsMenu" #programsTrigger="matMenuTrigger"
          (mouseenter)="openMenu(programsTrigger)" (mouseleave)="closeMenu(programsTrigger)"
          class="text-pep-ink fw-semibold">
          Our Programs <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #programsMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(programsTrigger)" (mouseleave)="closeMenu(programsTrigger)">
            <button mat-menu-item>Super Mom</button>
            <button mat-menu-item>Pepcares</button>
            <button mat-menu-item>ICH Pephands Center</button>
            <button mat-menu-item>Neonatal Kitchen</button>
            <button mat-menu-item> Give in Kind</button>
            <button mat-menu-item> Care fund</button>
            <button mat-menu-item>IAM</button>
          </div>
        </mat-menu>

        <!-- Celebrate By Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="celebrateMenu" #celebrateTrigger="matMenuTrigger"
          (mouseenter)="openMenu(celebrateTrigger)" (mouseleave)="closeMenu(celebrateTrigger)"
          class="text-pep-ink fw-semibold">
          Celebrate by <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #celebrateMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(celebrateTrigger)" (mouseleave)="closeMenu(celebrateTrigger)">
            <button mat-menu-item>Donating Food</button>
            <button mat-menu-item>Feeding a Dog</button>
            <button mat-menu-item>Sharing a Cake</button>
            <button mat-menu-item>Feed a Children home</button>
            <button mat-menu-item>Feed a Senior Home</button>
            <button mat-menu-item>Giving Grocery for a Month</button>
            <button mat-menu-item>Gifting a WheeelChair</button>
            <button mat-menu-item>Giving a Biriyani</button>
            <button mat-menu-item>Gifting a Toy</button>
            <button mat-menu-item>Giving Weekly Grocery</button>
            <button mat-menu-item>Adding Protein for Kids</button>
            <button mat-menu-item>Providing a Study Kit</button>
            <button mat-menu-item>Giving woman hygiene kit</button>
            <button mat-menu-item>giving bedsheets</button>
          </div>
        </mat-menu>

        <!-- Our Footprints Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="footprintsMenu" #footprintsTrigger="matMenuTrigger"
          (mouseenter)="openMenu(footprintsTrigger)" (mouseleave)="closeMenu(footprintsTrigger)"
          class="text-pep-ink fw-semibold">
          Our Footprints <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #footprintsMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(footprintsTrigger)" (mouseleave)="closeMenu(footprintsTrigger)">
            <button mat-menu-item>Pephands Chronicles</button>
            <button mat-menu-item>SDG Contributions</button>
            <button mat-menu-item>Annual Reports</button>
            <button mat-menu-item>Success Stories</button>
          </div>
        </mat-menu>

        <!-- Join Now Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="joinMenu" #joinTrigger="matMenuTrigger"
          (mouseenter)="openMenu(joinTrigger)" (mouseleave)="closeMenu(joinTrigger)"
          class="text-pep-ink fw-semibold">
          Join Now <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #joinMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(joinTrigger)" (mouseleave)="closeMenu(joinTrigger)">
            <button mat-menu-item>as a Donor</button>
            <button mat-menu-item>as a volunteer</button>
            <button mat-menu-item>as a csr partner</button>
            <button mat-menu-item>Careers</button>
          </div>
        </mat-menu>

        <!-- Campaigns Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="campaignsMenu" #campaignsTrigger="matMenuTrigger"
          (mouseenter)="openMenu(campaignsTrigger)" (mouseleave)="closeMenu(campaignsTrigger)"
          class="text-pep-ink fw-semibold">
          Campaigns <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #campaignsMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(campaignsTrigger)" (mouseleave)="closeMenu(campaignsTrigger)">
            <button mat-menu-item>Education</button>
            <button mat-menu-item>Medical</button>
            <button mat-menu-item>Celebrate Your Special Day</button>
            <button mat-menu-item>Feeding Strays</button>
            <button mat-menu-item>Care Fund</button>
            <button mat-menu-item>Give In Kind</button>
          </div>
        </mat-menu>

        <!-- More Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="moreMenu" #moreTrigger="matMenuTrigger"
          (mouseenter)="openMenu(moreTrigger)" (mouseleave)="closeMenu(moreTrigger)"
          class="text-pep-ink fw-semibold">
          More <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #moreMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(moreTrigger)" (mouseleave)="closeMenu(moreTrigger)">
            <button mat-menu-item routerLink="/blogs">Blog</button>
            <button mat-menu-item>FAQs</button>
            <button mat-menu-item>Contact</button>
            <button mat-menu-item>CSR</button>
          </div>
        </mat-menu>

        <!-- Events Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="eventsMenu" #eventsTrigger="matMenuTrigger"
          (mouseenter)="openMenu(eventsTrigger)" (mouseleave)="closeMenu(eventsTrigger)"
          class="text-pep-ink fw-semibold">
          Events <mat-icon iconPositionEnd>expand_more</mat-icon>
        </button>
        <mat-menu #eventsMenu="matMenu" [hasBackdrop]="false" class="modern-menu-panel">
          <div (mouseenter)="openMenu(eventsTrigger)" (mouseleave)="closeMenu(eventsTrigger)">
            <button mat-menu-item>All Events</button>
            <button mat-menu-item>Recent Events</button>
            <button mat-menu-item>Upcoming Events</button>
            <button mat-menu-item>Marathon 2026</button>
          </div>
        </mat-menu>

        <!-- Donate Button -->
        <button class="btn btn-donate-trendy fw-bold ms-2">
          Donate now
        </button>
      </div>
    </div>
  </header>
</div>
