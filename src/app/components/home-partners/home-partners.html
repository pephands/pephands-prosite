<section class="pephands-section py-5 bg-pep-bg position-relative overflow-hidden">
  <!-- Decorative background element -->
  <div class="position-absolute top-0 start-0 w-100 h-100 opacity-50" style="background: radial-gradient(circle at 10% 20%, rgba(var(--bs-primary-rgb), 0.05) 0%, transparent 40%); pointer-events: none;"></div>

  <div class="container py-lg-4 position-relative z-2">
    <div class="d-flex justify-content-between align-items-end mb-5 pb-3">
      <div class="heading-box text-start">
        <span class="topic-label text-pep-gold fw-bold text-uppercase tracking-wider small">Our Network</span>
        <h2 class="display-5 fw-bold text-pep-ink mb-3 tracking-tight">Trusted Partners</h2>
        <div class="accent-line bg-pep-primary rounded-pill" style="width: 60px; height: 4px"></div>
        <p class="lead text-muted mt-3 mb-0" style="max-width: 600px;">
          Collaborating with industry leaders to bring the best medical and supportive care to our community.
        </p>
      </div>
    </div>
  </div>

  <div class="container position-relative z-2 pb-5">
    <div class="logos-container premium-shadow rounded-4 bg-white">
      <div class="logos">
        <div class="logos-slide">
          <div class="logo-wrapper" *ngFor="let img of images">
            <img [src]="img" alt="pephands associations" />
          </div>
        </div>
        <div class="logos-slide">
          <div class="logo-wrapper" *ngFor="let img of images">
            <img [src]="img" alt="pephands associations" />
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
