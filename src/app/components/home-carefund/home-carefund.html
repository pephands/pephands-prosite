<section
  class="carefund-ad-section position-relative w-100 d-flex align-items-center justify-content-center overflow-hidden text-white"
>
  <!-- Dark overlay covering the background image for maximum readability -->
  <div class="background-overlay position-absolute top-0 start-0 w-100 h-100"></div>

  <div class="container d-flex align-items-center justify-content-center w-100">
    <!-- Centered Glassmorphic Card -->
    <div
      class="glass-content-card position-relative w-100 d-flex flex-column align-items-center justify-content-center text-center p-4 p-md-5 mx-3 mx-lg-0"
    >
      <!-- Logo Container -->
      <div class="logo-container mb-3">
        <img
          src="/carefund/carefund-logo-white.png"
          alt="Pep Cares Monthly Donation Program Logo"
          class="banner-logo"
        />
      </div>

      <h2 class="banner-heading mb-4">
        <span class="heading-accent d-block mb-1">Help Others</span>
        By Giving Monthly!
      </h2>

      <div class="accent-line mx-auto mb-4"></div>

      <p class="banner-description mb-4">
        Countless people can survive with your small help. Food, healthcare for children, cancer
        patients, elderly care, and palliative support are our primary goals.
      </p>

      <div class="banner-actions">
        <button
          mat-raised-button
          class="cta-button d-inline-flex align-items-center justify-content-center"
          [routerLink]="['/care-fund']"
        >
          Give Monthly Now <i class="ri-hand-heart-fill ms-2"></i>
        </button>
      </div>
    </div>
  </div>
</section>
