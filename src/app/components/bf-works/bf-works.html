<section class="pephands-section bf-works-section">
  <div class="container">
    <!-- Standardized Header -->
    <div class="heading-box text-center mb-5">
      <span class="topic-label text-pep-gold fw-bold text-uppercase tracking-wider small">Operational Flow</span>
      <h2 class="display-5 fw-bold text-pep-ink mb-3 tracking-tight">How it works?</h2>
      <div class="accent-line bg-pep-primary rounded-pill mx-auto" style="width: 60px; height: 4px"></div>
      <p class="lead text-muted mt-3 mb-0">End to End Process</p>
    </div>

    <div class="process-flow-container">
      <div class="process-grid">
        <!-- Step 1 -->
        <div class="process-step">
          <div class="diamond-wrapper">
            <div class="diamond-aura color-1"></div>
            <div class="diamond-shape">
              <div class="content">
                <div class="icon-circle">
                  <i class="ri-file-edit-fill"></i>
                </div>
                <h3>Registration</h3>
              </div>
              <div class="scanline"></div>
            </div>
            <div class="diamond-dash"></div>
          </div>
          <div class="connector">
            <div class="arrow-path"></div>
            <div class="arrow-head"></div>
          </div>
        </div>

        <!-- Step 2 -->
        <div class="process-step active">
          <div class="diamond-wrapper">
            <div class="diamond-aura color-2"></div>
            <div class="diamond-shape">
              <div class="content">
                <div class="icon-circle">
                  <i class="ri-user-search-fill"></i>
                </div>
                <h3>Screening</h3>
              </div>
              <div class="scanline"></div>
            </div>
            <div class="diamond-dash"></div>
          </div>
          <div class="connector">
            <div class="arrow-path"></div>
            <div class="arrow-head"></div>
          </div>
        </div>

        <!-- Step 3 -->
        <div class="process-step">
          <div class="diamond-wrapper">
            <div class="diamond-aura color-3"></div>
            <div class="diamond-shape">
              <div class="content">
                <div class="icon-circle">
                  <i class="ri-shopping-basket-2-fill"></i>
                </div>
                <h3>Collection</h3>
              </div>
              <div class="scanline"></div>
            </div>
            <div class="diamond-dash"></div>
          </div>
          <div class="connector">
            <div class="arrow-path"></div>
            <div class="arrow-head"></div>
          </div>
        </div>

        <!-- Step 4 -->
        <div class="process-step last">
          <div class="diamond-wrapper">
            <div class="diamond-aura color-4"></div>
            <div class="diamond-shape">
              <div class="content">
                <div class="icon-circle">
                  <i class="ri-hand-heart-fill"></i>
                </div>
                <h3>Donation</h3>
                <span class="sub-text">(Pephands Volunteers)</span>
              </div>
              <div class="scanline"></div>
            </div>
            <div class="diamond-dash"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
