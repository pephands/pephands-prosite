<div class="volunteer-glass-card p-4 p-md-5 position-relative overflow-hidden">
  <!-- Ambient background glow inside the card -->
  <div class="card-ambient-glow"></div>

  <!-- Restore standard heading design system style -->
  <div class="text-center heading-box mb-5 pb-4">
    <span class="topic-label text-pep-gold fw-bold text-uppercase tracking-wider small">Join Us</span>
    <h2 class="display-5 fw-bold text-pep-ink mb-3">Register as a Volunteer</h2>
    <div class="accent-line mx-auto bg-pep-primary rounded-pill" style="width: 60px; height: 4px;"></div>
  </div>

  <form [formGroup]="volunteerForm" (ngSubmit)="validateVolunteerForm()">
    <div class="row g-4">
      
      <!-- Name Field -->
      <div class="col-12 col-md-6">
        <div class="input-group-container">
          <label for="name" class="input-label">Name</label>
          <div class="input-wrapper">
            <input 
              id="name" 
              type="text" 
              class="form-control custom-input" 
              formControlName="name" 
              placeholder="Enter your name" 
              [class.is-invalid]="volunteerForm.controls['name'].touched && volunteerForm.controls['name'].invalid"
            />
            <span class="input-icon"><i class="fa-solid fa-user"></i></span>
          </div>
          <!-- Validation Errors -->
          <div class="error-wrapper" *ngIf="volunteerForm.controls['name'].touched && volunteerForm.controls['name'].invalid">
            <small class="error-msg" *ngIf="volunteerForm.controls['name'].hasError('required')">Name is required</small>
            <small class="error-msg" *ngIf="volunteerForm.controls['name'].hasError('minlength')">Name must be at least 3 characters</small>
            <small class="error-msg" *ngIf="volunteerForm.controls['name'].hasError('maxlength')">Name must be at most 50 characters</small>
          </div>
        </div>
      </div>

      <!-- Email Field -->
      <div class="col-12 col-md-6">
        <div class="input-group-container">
          <label for="email" class="input-label">Email</label>
          <div class="input-wrapper">
            <input 
              id="email" 
              type="email" 
              class="form-control custom-input" 
              formControlName="email" 
              placeholder="Enter your email" 
              [class.is-invalid]="volunteerForm.controls['email'].touched && volunteerForm.controls['email'].invalid"
            />
            <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
          </div>
          <!-- Validation Errors -->
          <div class="error-wrapper" *ngIf="volunteerForm.controls['email'].touched && volunteerForm.controls['email'].invalid">
            <small class="error-msg" *ngIf="volunteerForm.controls['email'].hasError('required')">Email is required</small>
            <small class="error-msg" *ngIf="volunteerForm.controls['email'].hasError('email')">Invalid email address</small>
          </div>
        </div>
      </div>

      <!-- Phone Field -->
      <div class="col-12 col-md-6">
        <div class="input-group-container">
          <label for="phone" class="input-label">Phone</label>
          <div class="input-wrapper">
            <input 
              id="phone" 
              type="text" 
              (input)="onInputChange($event)" 
              formControlName="phone" 
              maxlength="10" 
              class="form-control custom-input" 
              placeholder="Enter phone number" 
              [class.is-invalid]="volunteerForm.controls['phone'].touched && volunteerForm.controls['phone'].invalid"
            />
            <span class="input-icon"><i class="fa-solid fa-phone"></i></span>
          </div>
          <!-- Validation Errors -->
          <div class="error-wrapper" *ngIf="volunteerForm.controls['phone'].touched && volunteerForm.controls['phone'].invalid">
            <small class="error-msg" *ngIf="volunteerForm.controls['phone'].hasError('required')">Phone is required</small>
            <small class="error-msg" *ngIf="volunteerForm.controls['phone'].hasError('minlength')">Phone must be 10 digits</small>
          </div>
        </div>
      </div>

      <!-- District Field -->
      <div class="col-12 col-md-6">
        <div class="input-group-container">
          <label for="district" class="input-label">District</label>
          <div class="input-wrapper">
            <select 
              id="district" 
              class="form-select custom-input custom-select" 
              [class.placeholder-selected]="!volunteerForm.controls['district'].value"
              formControlName="district"
              [class.is-invalid]="volunteerForm.controls['district'].touched && volunteerForm.controls['district'].invalid"
            >
              <option [ngValue]="null">Select District</option>
              <option *ngFor="let district of districts" [value]="district.value">
                {{ district.name }}
              </option>
            </select>
            <span class="input-icon"><i class="fa-solid fa-location-dot"></i></span>
          </div>
          <!-- Validation Errors -->
          <div class="error-wrapper" *ngIf="volunteerForm.controls['district'].touched && volunteerForm.controls['district'].invalid">
            <small class="error-msg" *ngIf="volunteerForm.controls['district'].hasError('required')">District is required</small>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="col-12 text-center mt-4 pt-2">
        <button type="submit" class="btn volunteer-glass-btn px-5">
          Submit Details <i class="fa-solid fa-arrow-right ms-2 btn-arrow"></i>
        </button>
      </div>

    </div>
  </form>
</div>
