<section class="sdg-section pephands-section">

  <div class="container position-relative z-2">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-5 pb-2">
      <div class="heading-box text-start mb-4 mb-md-0">
        <span class="topic-label text-pep-gold fw-bold text-uppercase tracking-wider small">Our Commitment</span>
        <h2 class="display-5 fw-bold text-white mb-3 tracking-tight">SDGs We Support</h2>
        <div class="accent-line bg-pep-gold rounded-pill" style="width: 60px; height: 4px"></div>
        <p class="lead text-white-50 mt-3 mb-0" style="max-width: 600px;">
          Committed to achieving the UN Sustainable Development Goals <br class="d-none d-md-block" />
          through meaningful action and global partnership.
        </p>
      </div>

      <div class="master-logo-box text-start text-md-end">
        <img src="/home-page/sdg-image.png" alt="SDG Master" class="master-logo" />
      </div>
    </div>
  </div>

  <!-- Infinite Marquee Scroll Strip -->
  <div class="marquee-wrapper">
    <div class="marquee-track">
      <!-- First set -->
      <div class="sdg-card" *ngFor="let goal of sdgGoals">
        <div class="sdg-card-inner">
          <img [src]="goal.src" [alt]="goal.alt" class="sdg-img" />
          <span class="sdg-label">{{ goal.alt }}</span>
        </div>
      </div>
      <!-- Duplicate for seamless loop -->
      <div class="sdg-card" *ngFor="let goal of sdgGoals">
        <div class="sdg-card-inner">
          <img [src]="goal.src" [alt]="goal.alt" class="sdg-img" />
          <span class="sdg-label">{{ goal.alt }}</span>
        </div>
      </div>
    </div>
  </div>

</section>
