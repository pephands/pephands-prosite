<section class="give-kind-section pephands-section">
  <div class="container">
    <div class="row align-items-center">
      <!-- Content Column -->
      <div class="col-lg-6 order-2 order-lg-1">
        <div class="content-box pe-lg-5">
          <!-- New Centered Heading Section -->
          <div class="heading-box text-center text-lg-start mb-4">
            <span
              class="topic-label text-pep-gold fw-bold text-uppercase tracking-wider small d-block mb-2"
              >Share the Joy</span
            >
            <h2 class="display-5 fw-bold text-pep-ink mb-3 tracking-tight">Give in Kind</h2>
            <div
              class="accent-line bg-pep-primary rounded-pill mx-auto ms-lg-0"
              style="width: 60px; height: 4px"
            ></div>
          </div>
          <p class="description mb-4">
            Your gently used items can bring immense happiness to someone in need. Whether it's toys
            that once brought smiles, blankets for cold nights, or a bicycle that can help a student
            reach school—every gift counts.
          </p>

          <div class="donation-items mb-5">
            <div class="item-tag"><i class="fas fa-teddy-bear me-2"></i>Toys</div>
            <div class="item-tag"><i class="fas fa-blanket me-2"></i>Blankets</div>
            <div class="item-tag"><i class="fas fa-bicycle me-2"></i>Cycles</div>
            <div class="item-tag"><i class="fas fa-book me-2"></i>Books</div>
            <div class="item-tag"><i class="fas fa-tshirt me-2"></i>Clothes</div>
          </div>

          <button
            mat-raised-button
            class="btn btn-donate shadow-sm"
            [routerLink]="['/give-in-kind']"
          >
            <span>Start Donating</span>
            <i class="fas fa-arrow-right ms-2 transition-icon"></i>
          </button>
        </div>
      </div>

      <!-- Image Column -->
      <div class="col-lg-6 order-1 order-lg-2 mb-4 mb-lg-0">
        <div class="image-wrapper">
          <img
            src="/giveinkind/give-in-kind.png"
            alt="Give in Kind Donation Illustration"
            class="img-fluid rounded-4 shadow-lg"
          />
          <div class="floating-badge">
            <i class="fas fa-heart text-danger"></i>
            <span>Spread Love</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
