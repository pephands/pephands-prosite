<section class="py-5 bg-light">
  <div class="container my-5 position-relative">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div class="heading-box text-start">
        <span class="topic-label text-pep-gold fw-bold text-uppercase tracking-wider small">Latest News</span>
        <h2 class="display-5 fw-bold text-pep-ink mb-3 tracking-tight">Our Blogs</h2>
        <div class="accent-line bg-pep-primary rounded-pill" style="width: 60px; height: 4px"></div>
        <p class="lead text-muted mt-3 mb-0">Stay updated with our latest news and impactful stories.</p>
      </div>
      
      <!-- Slider Navigation Controls (Desktop) -->
      <div class="d-none d-md-flex gap-2">
        <button class="slider-btn" (click)="scrollSlider(-1)">
          <i class="bi bi-chevron-left"></i>
        </button>
        <button class="slider-btn" (click)="scrollSlider(1)">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>

    <!-- The Slider Track -->
    <div class="blog-slider-track" #sliderTrack>
      <div class="blog-slide" *ngFor="let blog of blogs | slice:0:9">
        <app-blog-card [blog]="blog"></app-blog-card>
      </div>
    </div>

    <!-- View All Button -->
    <div class="text-center mt-5 pt-3">
      <a routerLink="/blogs" class="view-all-modern-btn">
        <span class="btn-text">View All Blogs</span>
        <span class="btn-icon">
          <i class="bi bi-arrow-right"></i>
        </span>
      </a>
    </div>
  </div>
</section>
